<!DOCTYPE html>

{{- $data := hugo.Data.items -}}

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <title>C:U Recipe Planner</title>
  <script>
  function selectRecipe() {
    var recipeName = document.getElementById("recipe").value;
    var listDiv = document.getElementById("recipeList");
    var data = {{ $data }};
    var text = "";
    var list = [];

    listDiv.innerHTML = '';

    for (let i = 0; i < data.length; i++) {
      if (data[i].name.includes(recipeName)) {
        //document.getElementById("result").innerText = data[i].name;
        list.push(data[i].name);
        //break;
      }
    }

    for (let i = 0; i < list.length; i++) {
      //text += list[i] + "\n";
      //document.getElementById("result").innerText = data[i].name;

      let itemDiv = document.createElement("div");
      let listItem = document.createTextNode(list[i]);

      itemDiv.appendChild(listItem);
      listDiv.appendChild(itemDiv);
    }
  }
  </script>
  <noscript>Sorry, your browser does not support JavaScript!</noscript>
</head>
<body>
  <label for="reqRecipe">Choose a recipe: </label>
  <input type="text" id="recipe" size="20" name="reqRecipe" oninput="selectRecipe()">
  <br>
  <div id="recipeList">

  </div>
  <p id="result">hi</p>
</body>
</html>
